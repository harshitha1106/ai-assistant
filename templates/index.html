<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackWise AI Assistant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 TrackWise AI Assistant</h1>
      <p>Your personal AI that tracks expenses and answers anything</p>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="welcome">
        <h2>Hello, Harshitha! 👋</h2>
        <p>
          Try saying:<br>
          "I spent ₹200 on food"<br>
          "show my expenses"<br>
          "what is machine learning?"
        </p>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type a message..." />
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
